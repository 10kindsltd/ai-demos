<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Localization QA report</title>
<!--
  Print-oriented QA sign-off — self-contained template for browser print-to-PDF.

  HOW THE qa-report SKILL USES THIS FILE:
  Replace the JSON inside <script id="qa-data"> with the real run data (same schema as
  dashboard-template.html, plus an optional "summary" string), save the filled file, and
  print it to PDF with a headless Chromium-based browser already on the machine — no
  Python, no pip. Example:

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --no-pdf-header-footer \
      --print-to-pdf="qa-output/<name>.pdf" \
      "file:///abs/path/to/filled-report.html"

  (Brave/Edge/Chromium accept the same flags. Pick whichever browser binary exists.)
-->
<style>
  @page { size: A4; margin: 16mm 15mm; }
  * { box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; color: #1f2733;
    font: 10.5px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .doc { max-width: 720px; margin: 0 auto; padding: 8px 0 24px; }
  h1 { font-size: 21px; letter-spacing: -0.01em; margin: 0 0 2px; }
  .sub { color: #2f4b6e; font-size: 11px; margin: 0 0 12px; }
  hr { border: none; border-top: 1px solid #dfe3ea; margin: 10px 0 14px; }
  h2 { font-size: 12.5px; color: #2f4b6e; margin: 18px 0 6px; }
  h2 .hint { font-weight: 400; color: #5b6472; font-size: 10px; }
  p { margin: 0 0 8px; }

  .meta { width: 100%; border-collapse: collapse; background: #f2f5f9; border: 1px solid #dfe3ea; }
  .meta td { padding: 6px 9px; vertical-align: middle; border-bottom: 1px solid #fff; }
  .meta .k { color: #5b6472; font-weight: 700; width: 15%; font-size: 9px; text-transform: uppercase; letter-spacing: 0.03em; }
  .meta .v { color: #1f2733; width: 35%; }
  .verdict { font-weight: 700; letter-spacing: 0.03em; }
  .verdict.pass { color: #1a7f4b; } .verdict.warn { color: #a35a12; } .verdict.fail { color: #b23b34; }

  table.find { width: 100%; border-collapse: collapse; margin: 4px 0 4px; }
  table.find th { background: #2f4b6e; color: #fff; font-size: 8.5px; text-align: left; padding: 5px 7px; font-weight: 600; }
  table.find td { padding: 5px 7px; border-bottom: 0.5px solid #e6e9f0; vertical-align: top; }
  table.find tr:nth-child(even) td { background: #f7f9fc; }
  .locale { font-weight: 700; white-space: nowrap; }
  .sev { font-weight: 700; text-transform: capitalize; white-space: nowrap; }
  .sev.high { color: #b23b34; } .sev.medium { color: #a35a12; } .sev.low { color: #6b7280; }
  .quote { color: #1f2733; }
  .clean { color: #1a7f4b; font-weight: 600; margin: 4px 0 0; }
  .none { color: #5b6472; }

  .signoff { margin-top: 20px; }
  .signoff .line { margin: 4px 0; letter-spacing: 0.01em; }
  .box { display: inline-block; width: 11px; height: 11px; border: 1px solid #5b6472; vertical-align: -1px; margin-right: 4px; }
  footer { margin-top: 22px; color: #9aa2b1; font-size: 8.5px; text-align: center; }
  tr, .signoff { break-inside: avoid; }
</style>
</head>
<body>
<div class="doc">
  <h1>Localization QA report</h1>
  <p class="sub" id="sub">Prepared for a client</p>
  <hr>
  <table class="meta"><tbody id="meta"></tbody></table>

  <h2>Summary</h2>
  <p id="summary" class="none">—</p>

  <h2>Report 1 <span class="hint">— per-translation compliance</span></h2>
  <table class="find" id="r1"></table>
  <div id="clean"></div>

  <h2>Report 2 <span class="hint">— cross-translation drift</span></h2>
  <table class="find" id="r2"></table>

  <div class="signoff">
    <h2>Sign-off</h2>
    <p class="line">Reviewer: ______________________________&nbsp;&nbsp;&nbsp;&nbsp;Date: __________________</p>
    <p class="line" id="approve"></p>
  </div>

  <footer>Generated by the qa-report skill · Localization QA Toolkit</footer>
</div>

<script id="qa-data" type="application/json">
{
  "client": "Warden Security",
  "source": "How real-time protection works",
  "phase": "post-translation",
  "date": "2026-07-13",
  "locales": ["fr-FR", "de-DE"],
  "verdict": "fail",
  "summary": "Two translations of this article were reviewed against Warden's brand and localization guides, and against the English source. The German is clean and ready, apart from a closing paragraph missing from the source it was translated from. The French needs another pass: it changes a published performance figure, uses two different terms for real-time protection, and mixes formal and informal address. The changed figure — 5% where the source says under 2% — is the one to fix first, because it alters a factual claim rather than the wording.",
  "findings": [
    {"locale":"fr-FR","category":"Numeric/claim","severity":"high","report":"drift","quote":"impact CPU moyen de moins de 5 %","issue":"The CPU impact figure was changed. The English source says under 2%; the French says under 5%.","fix":"Restore the exact source figure — moins de 2 %.","reference":"Localization guide §2.3 & §6"},
    {"locale":"fr-FR","category":"Register/formality","severity":"high","report":"compliance","quote":"tu verras une courte notification","issue":"Informal 'tu' where fr-FR defaults to 'vous' (same paragraph uses 'votre part').","fix":"vous verrez…","reference":"Localization guide §5"},
    {"locale":"fr-FR","category":"Register/formality","severity":"high","report":"drift","quote":"'Vous pouvez…' vs 'tu verras…'","issue":"Formality switches within one document: vous in paragraph 2, tu in paragraph 3.","fix":"Consistent vous throughout.","reference":"Localization guide §5"},
    {"locale":"fr-FR","category":"Terminology","severity":"medium","report":"compliance","quote":"La protection instantanée","issue":"Not the approved term for real-time protection.","fix":"protection en temps réel","reference":"Localization guide §3"},
    {"locale":"fr-FR","category":"Terminology","severity":"medium","report":"drift","quote":"heading vs body wording","issue":"Heading 'protection en temps réel' vs body 'protection instantanée'; de-DE stays consistent.","fix":"One term throughout.","reference":"Localization guide §3"},
    {"locale":"fr-FR","category":"Terminology","severity":"low","report":"compliance","quote":"depuis le tableau de bord","issue":"'Dashboard' should stay in English in fr-FR tech contexts.","fix":"depuis le Dashboard","reference":"Localization guide §3 & §5"},
    {"locale":"de-DE","category":"Structural","severity":"medium","report":"drift","quote":"closing paragraph","issue":"The source's closing paragraph is missing from the German.","fix":"Add the missing closing paragraph.","reference":"Source document structure"}
  ]
}
</script>
<script>
  (function () {
    const d = JSON.parse(document.getElementById("qa-data").textContent);
    const F = d.findings || [];
    const esc = s => String(s == null ? "" : s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

    document.getElementById("sub").textContent = "Prepared for " + (d.client || "the client");
    const phase = d.phase === "pre-translation" ? "Pre-translation" : "Post-translation";
    document.getElementById("meta").innerHTML =
      `<tr><td class="k">Source</td><td class="v">${esc(d.source||"—")}</td><td class="k">Phase</td><td class="v">${phase}</td></tr>` +
      `<tr><td class="k">Locales</td><td class="v">${(d.locales||[]).map(esc).join(", ")||"—"}</td><td class="k">Date</td><td class="v">${esc(d.date||"")}</td></tr>` +
      `<tr><td class="k">Reference</td><td class="v">Client brand &amp; localization guides</td><td class="k">Result</td>` +
      `<td class="v"><span class="verdict ${d.verdict||'warn'}">${(d.verdict==='fail'?'Needs revision':d.verdict==='pass'?'Approved':'Review')}</span></td></tr>`;

    if (d.summary) { const p = document.getElementById("summary"); p.className = ""; p.textContent = d.summary; }

    // Report 1 — compliance
    const c = F.filter(f => f.report === "compliance");
    const r1 = document.getElementById("r1");
    if (c.length) {
      r1.innerHTML = "<tr><th>Locale</th><th>Quote</th><th>Issue</th><th>Category</th><th>Suggested fix</th><th>Reference</th></tr>" +
        c.map(f => `<tr><td class="locale">${esc(f.locale)}</td><td class="quote">${esc(f.quote)}</td><td>${esc(f.issue)}</td><td>${esc(f.category)}</td><td>${esc(f.fix)}</td><td>${esc(f.reference)}</td></tr>`).join("");
    } else { r1.outerHTML = '<p class="none">No compliance findings.</p>'; }

    // Clean-locale note
    const withCompliance = new Set(c.map(f => f.locale));
    const clean = (d.locales || []).filter(l => !withCompliance.has(l));
    if (clean.length) document.getElementById("clean").innerHTML = `<p class="clean">Clean: ${clean.map(esc).join(", ")} — compliant with the client's guides.</p>`;

    // Report 2 — drift
    const dr = F.filter(f => f.report === "drift");
    const r2 = document.getElementById("r2");
    if (dr.length) {
      r2.innerHTML = "<tr><th>Locale</th><th>Concept / quote</th><th>What was found</th><th>Expected treatment</th><th>Severity</th></tr>" +
        dr.map(f => `<tr><td class="locale">${esc(f.locale)}</td><td class="quote">${esc(f.quote)}</td><td>${esc(f.issue)}</td><td>${esc(f.fix)}</td><td class="sev ${f.severity}">${esc(f.severity)}</td></tr>`).join("");
    } else { r2.outerHTML = '<p class="none">No cross-translation drift.</p>'; }

    document.getElementById("approve").innerHTML = "Delivery approved: " +
      (d.locales || []).map(l => `<span class="box"></span>${esc(l)}`).join("&nbsp;&nbsp;&nbsp;&nbsp;");
  })();
</script>
</body>
</html>
