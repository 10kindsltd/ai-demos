AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Insurance quote comparison pipeline

Parameters:
  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Gemini API key

Globals:
  Function:
    Runtime: python3.14
    Timeout: 120
    MemorySize: 512
    Environment:
      Variables:
        BUCKET_NAME: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"
        GEMINI_API_KEY: !Ref GeminiApiKey

Resources:

  QuoteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"

  ExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/src/
      Handler: handler.lambda_handler
      Policies:
        - S3FullAccessPolicy:
            BucketName: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"
      Events:
        QuotePdfUploaded:
          Type: S3
          Properties:
            Bucket: !Ref QuoteBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: clients/
                  - Name: suffix
                    Value: .pdf

Outputs:
  BucketName:
    Value: !Ref QuoteBucket
    Description: Drop PDFs into clients/{client-id}/quotes/
