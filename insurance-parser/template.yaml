AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Insurance quote comparison pipeline

Parameters:
  BedrockRegion:
    Type: String
    Default: eu-west-2
    Description: AWS region for the bedrock-mantle endpoint
  BedrockApiKey:
    Type: String
    NoEcho: true
    Description: Bedrock API key for the bedrock-mantle endpoint

Globals:
  Function:
    Runtime: python3.14
    Timeout: 120
    MemorySize: 512
    Environment:
      Variables:
        BUCKET_NAME: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"
        BEDROCK_REGION: !Ref BedrockRegion
        AWS_BEARER_TOKEN_BEDROCK: !Ref BedrockApiKey

Resources:

  QuoteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"

  ExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambda/src/
      Handler: handler.lambda_handler
      Policies:
        - S3FullAccessPolicy:
            BucketName: !Sub "demo-insurance-parser-${AWS::AccountId}-${AWS::Region}"
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:GetFoundationModel
              Resource: "*"
      Events:
        QuotePdfUploaded:
          Type: S3
          Properties:
            Bucket: !Ref QuoteBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: clients/
                  - Name: suffix
                    Value: .pdf

Outputs:
  BucketName:
    Value: !Ref QuoteBucket
    Description: Drop PDFs into clients/{client-id}/quotes/
